server:
  port: 8080

spring:
  application:
    name: webox-server
  datasource:
    url: jdbc:mysql://localhost:3306/webox?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: webox123
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    generator:
      write-bigdecimal-as-plain: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 3600

app:
  jwt:
    # 本地开发默认值；生产用环境变量 JWT_SECRET 覆盖（见 README）
    secret: ${JWT_SECRET:webox-dev-secret-key-please-override-in-prod-0123456789abcdef}
    ttl-hours: 12
  upload:
    # Dish image uploads land here and are served from /images/dishes/** (see WebConfig).
    dir: ${user.dir}/uploads
  llm:
    # OpenAI-compatible endpoint.  Set LLM_API_KEY to a real key; without it the AI
    # feature shows a friendly "not configured" message.
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:changeme}
    model: ${LLM_MODEL:gpt-4o-mini}
